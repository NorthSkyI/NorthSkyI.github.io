<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱日记 - 我们的爱情故事</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vintage-room">
        <div class="room-background">
            <div class="wooden-floor"></div>
            <div class="vintage-wall">
                <div class="couple-profile-frame">
                    <div class="couple-profile">
                        <div class="avatar-layout">
                            <div class="avatar-item">
                                <img src="images/avatar-1.jpg" alt="头像1" class="avatar avatar-1">
                                <span class="nickname">丹阳</span>
                            </div>
                            <div class="heart-animation">❤️</div>
                            <div class="avatar-item">
                                <img src="images/avatar-2.jpg" alt="头像2" class="avatar avatar-2">
                                <span class="nickname">永琪</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="photo-frame">
                    <div class="photo-content">
                        <h1>❤️ 我们的爱情 ❤️</h1>
                        <div class="detailed-time">
                            <p>这是我们一起走过的<br><span id="detailed-days">0</span> 天 <span id="detailed-hours">0</span> 小时 <span id="detailed-minutes">0</span> 分钟 <span id="detailed-seconds">0</span> 秒</p>
                            <span id="detailed-countdown" style="display: none;">2026-02-16</span>
                        </div>
                        <div class="love-stats">
                            <div class="stat-card">
                                <h3>恋爱天数</h3>
                                <div id="love-days" class="number">0</div>
                                <span>天</span>
                            </div>
                            <div class="stat-card">
                                <h3>恋爱小时</h3>
                                <div id="love-hours" class="number">0</div>
                                <span>小时</span>
                            </div>
                            <div class="stat-card">
                                <h3>恋爱分钟</h3>
                                <div id="love-minutes" class="number">0</div>
                                <span>分钟</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="memory-board">
                    <h2>📅 纪念日</h2>
                    <div class="anniversaries">
                        <div class="anniversary-item">
                            <span class="event-name">相遇纪念日</span>
                            <span class="event-date" id="meet-day">2026-02-16</span>
                            <span class="countdown" id="meet-countdown"></span>
                        </div>
                        <div class="anniversary-item">
                            <span class="event-name">恋爱纪念日</span>
                            <span class="event-date" id="love-day">2026-02-21</span>
                            <span class="countdown" id="love-countdown"></span>
                        </div>
                        <div class="anniversary-item">
                            <span class="event-name">下一个情人节</span>
                            <span class="event-date" id="valentine-day">2027-02-14</span>
                            <span class="countdown" id="valentine-countdown"></span>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>

    <div class="floating-hearts">
        <div class="heart">❤️</div>
        <div class="heart">💕</div>
        <div class="heart">💖</div>
        <div class="heart">💗</div>
        <div class="heart">💓</div>
    </div>

    <!-- 音乐控制面板 -->
    <div class="music-control-panel">
        <div class="music-toggle" onclick="toggleMusicPanel()">
            ♫
        </div>
        <div class="music-panel">
            <div class="now-playing">
                <span id="current-song">未播放</span>
            </div>
            <div class="music-controls">
                <button onclick="playPauseMusic()" id="play-pause-btn">▶</button>
                <button onclick="playNextSong()">⏭️</button>
            </div>
        </div>
    </div>

    <audio id="background-music" loop></audio>
    <script src="script.js"></script>
</body>
</html>
